<!DOCTYPE html>
<html>
<head>

<title>Attendance Records</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
font-family:Segoe UI;
}

/* CARD */

.table-card{
background:#1e293b;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* SEARCH */

.search-box{
margin-bottom:15px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">
Student Management System
</span>

<a href="/dashboard" class="btn btn-light">Dashboard</a>

</div>

</nav>

<div class="container mt-4">

<h2 class="mb-3">Attendance Records</h2>

<div class="table-card">

<input type="text" id="searchInput" class="form-control search-box" placeholder="Search records...">

<div class="table-responsive">

<table class="table table-dark table-bordered table-hover">

<thead>
<tr>
<th>Name</th>
<th>Register No</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>

<tbody id="attendanceTable">

{% for r in records %}

<tr>
<td>{{r.name}}</td>
<td>{{r.reg_no}}</td>
<td>{{r.date}}</td>

<td>
{% if r.status == "Present" %}
<span class="badge bg-success">Present</span>
{% else %}
<span class="badge bg-danger">Absent</span>
{% endif %}
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

<script>

let searchInput = document.getElementById("searchInput")

searchInput.addEventListener("keyup", function(){

let filter = searchInput.value.toLowerCase()
let rows = document.querySelectorAll("#attendanceTable tr")

rows.forEach(row => {

let text = row.textContent.toLowerCase()

row.style.display = text.includes(filter) ? "" : "none"

})

})

</script>

</body>
</html>
