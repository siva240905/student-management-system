<!DOCTYPE html>
<html>
<head>

<title>Student Management Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
position:fixed;
background:rgba(0, 0, 0, 0.05);
backdrop-filter:blur(10px);
border-right:1px solid rgba(255,255,255,0.1);
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:#cbd5f1;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
background:#1e293b;
color:white;
}

/* MAIN */

.main{
margin-left:240px;
padding:30px;
}

/* CARDS */

.stat-card{
background:rgba(255,255,255,0.05);
border-radius:15px;
padding:25px;
backdrop-filter:blur(8px);
transition:0.3s;
}

.stat-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.stat-number{
font-size:32px;
font-weight:bold;
}

/* TOGGLE BUTTON */

.toggle-btn{
position:absolute;
right:30px;
top:25px;
}

/* LIGHT MODE */

.light-mode{
background:#f1f5f9;
color:black;
}

/* Sidebar in light mode */

.light-mode .sidebar{
background:#ffffff;
border-right:1px solid #e2e8f0;
}

/* Sidebar links */

.light-mode .sidebar a{
color:#1e293b;
}

.light-mode .sidebar a:hover{
background:#e2e8f0;
}

/* Cards */

.light-mode .stat-card{
background:#ffffff;
color:black;
}

/* Toggle button */

.light-mode .toggle-btn{
color:black;
border-color:black;
}

/* CHART SIZE */

#attendanceChart{
max-width:600px;
max-height:300px;
margin:auto;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h4>Staff Panel</h4>

<a href="/dashboard">Dashboard</a>
<a href="/add_student">Add Student</a>
<a href="/students">Students</a>
<a href="/attendance">Mark Attendance</a>
<a href="/view_attendance">Attendance Report</a>

</div>

<!-- MAIN -->

<div class="main">

<h2>Dashboard</h2>

<button class="btn btn-outline-light toggle-btn" onclick="toggleMode()">
Toggle Mode
</button>

<br><br>

<div class="row g-4">

<div class="col-md-4">
<div class="stat-card">
<h6>Total Students</h6>
<div class="stat-number">{{total_students}}</div>
</div>
</div>

<div class="col-md-4">
<div class="stat-card">
<h6>Total Attendance Records</h6>
<div class="stat-number">{{total_attendance}}</div>
</div>
</div>

<div class="col-md-4">
<div class="stat-card">
<h6>Attendance Percentage</h6>
<div class="stat-number">{{attendance_percent}}%</div>
</div>
</div>

</div>

<br><br>

<h4>Attendance Analytics</h4>

<canvas id="attendanceChart" height="60"></canvas>

</div>

<script>

function toggleMode(){
document.body.classList.toggle("light-mode");
}

// Chart

var ctx = document.getElementById('attendanceChart').getContext('2d');

new Chart(ctx,{
type:'doughnut',
data:{
labels:['Present','Absent'],
datasets:[{
data:[{{present}},{{absent}}],
backgroundColor:['#22c55e','#ef4444']
}]
}
});

</script>

</body>
</html>
