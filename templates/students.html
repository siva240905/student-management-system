<!DOCTYPE html>
<html>
<head>

<title>Students</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
font-family:Segoe UI;
}

/* TABLE CARD */

.table-card{
background:#1e293b;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* SEARCH BAR */

.search-box{
margin-bottom:15px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">
Student Management System
</span>

<a href="/dashboard" class="btn btn-light">Dashboard</a>

</div>

</nav>

<div class="container mt-4">

<h2 class="mb-3">Students List</h2>

<div class="table-card">

<input type="text" id="searchInput" class="form-control search-box" placeholder="Search student...">

<div class="table-responsive">

<table class="table table-dark table-hover table-bordered">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Reg No</th>
<th>Department</th>
<th>Year</th>
<th>Email</th>
<th>Action</th>
</tr>

</thead>

<tbody id="studentTable">

{% for s in students %}

<tr>
<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>{{s[3]}}</td>
<td>{{s[4]}}</td>
<td>{{s[5]}}</td>

<td>

<a href="/edit/{{s[0]}}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="/delete/{{s[0]}}" class="btn btn-danger btn-sm"
onclick="return confirm('Delete this student?')">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

<script>

let searchInput = document.getElementById("searchInput")

searchInput.addEventListener("keyup", function(){

let filter = searchInput.value.toLowerCase()
let rows = document.querySelectorAll("#studentTable tr")

rows.forEach(row => {

let text = row.textContent.toLowerCase()

row.style.display = text.includes(filter) ? "" : "none"

})

})

</script>

</body>
</html>
