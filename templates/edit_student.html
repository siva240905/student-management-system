<!DOCTYPE html>
<html>
<head>

<title>Edit Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
background:linear-gradient(135deg,#020617,#0f172a);
display:flex;
align-items:center;
justify-content:center;
font-family:Segoe UI;
color:white;
}

/* FORM CARD */

.form-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:15px;
padding:40px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* INPUT */

.form-control{
background:rgba(255,255,255,0.08);
border:none;
color:white;
}

.form-control:focus{
background:rgba(255,255,255,0.12);
color:white;
}

/* BUTTON */

.btn-primary{
width:100%;
margin-top:10px;
}

/* BACK BUTTON */

.back-btn{
display:block;
margin-top:15px;
text-align:center;
color:#94a3b8;
text-decoration:none;
}

.back-btn:hover{
color:white;
}

</style>

</head>

<body>

<div class="form-card">

<h3 class="text-center mb-4">Edit Student</h3>

<form method="POST">

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" value="{{student[1]}}" required>
</div>

<div class="mb-3">
<label>Register Number</label>
<input type="text" name="reg" class="form-control" value="{{student[2]}}" required>
</div>

<div class="mb-3">
<label>Department</label>
<input type="text" name="dept" class="form-control" value="{{student[3]}}" required>
</div>

<div class="mb-3">
<label>Year</label>
<input type="number" name="year" class="form-control" value="{{student[4]}}" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" value="{{student[5]}}" required>
</div>

<button type="submit" class="btn btn-primary">
Update Student
</button>

</form>

<a href="/students" class="back-btn">
⬅ Back to Students
</a>

</div>

</body>
</html>
